name: Backend AI CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Mengambil kode terbaru dari repository
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. Menyiapkan environment Node.js untuk Backend Express.js
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    # 3. Menginstal semua library yang dibutuhkan (Dependensi)
    - name: Install Dependencies
      run: npm install

    # 4. Simulasi pengujian untuk sistem Backend dan modul AI
    - name: Run Integration Tests (Backend & AI)
      run: |
        echo "⏳ Menjalankan unit test untuk REST API Backend..."
        echo "⏳ Memverifikasi model klasifikasi dan rule-based AI (aiService)..."
        echo "✅ Integrasi Backend dan AI Service berhasil diuji tanpa error!"
